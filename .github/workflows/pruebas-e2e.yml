name: Pruebas E2E (Playwright)

# Corre la suite en cada push/PR a main: sirve la PWA (estatica) en localhost
# y valida integridad de datos, smoke, accesibilidad (axe), responsive,
# busqueda (regresion del foco) y PWA (manifest + service worker).
# Tambien se puede lanzar a mano desde la pestaña Actions.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: PRUEBAS-E2E/package-lock.json

      - name: Instalar dependencias
        working-directory: PRUEBAS-E2E
        run: npm ci

      - name: Instalar navegador Playwright
        working-directory: PRUEBAS-E2E
        run: npx playwright install --with-deps chromium

      - name: Correr suite (Playwright sirve la PWA en localhost:8123)
        working-directory: PRUEBAS-E2E
        run: npx playwright test --reporter=list

      - name: Subir reporte (si falla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: PRUEBAS-E2E/playwright-report
          retention-days: 14
